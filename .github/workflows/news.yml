name: Fetch news

# Pulls latest headlines for every qualifier + IPO into data/news.json.
# - Runs daily (after the scan) so the News tab is always fresh.
# - "Run workflow" button (workflow_dispatch) = your manual "fetch live news now".
on:
  schedule:
    - cron: '30 11 * * 1-5'   # 17:00 IST weekdays, just after the 16:30 scan
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: news
  cancel-in-progress: false

jobs:
  news:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install requests
      - name: Fetch headlines
        run: python news_fetch.py
      - name: Commit news.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/news.json
          if git diff --cached --quiet; then
            echo "no news changes"; exit 0
          fi
          git commit -m "news: refresh headlines [skip ci]"
          for i in 1 2 3; do
            git pull --rebase --autostash && git push && break || sleep 5
          done
