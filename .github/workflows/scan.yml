name: Daily Scan

on:
  schedule:
    # 11:00 UTC = 16:30 IST (30 min after NSE close)
    - cron: "0 11 * * 1-5"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r scanner/requirements.txt

      - name: Run scanner
        run: python scanner/scan.py

      - name: Commit results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add scanner/data/
          if git diff --cached --quiet; then
            echo "No data changes"
          else
            git commit -m "chore: refresh scan $(date -u +%Y-%m-%dT%H:%MZ)"
            git push
          fi

  deploy:
    needs: scan
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}
      - uses: actions/configure-pages@v5
      - name: Stage site
        run: |
          mkdir -p _site
          cp -r scanner/web/* _site/
          mkdir -p _site/data
          cp scanner/data/scanner_output.json _site/data/ 2>/dev/null || true
          # Point web app at sibling data dir on Pages
          sed -i 's|../data/scanner_output.json|data/scanner_output.json|g' _site/app.js
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site
      - id: deployment
        uses: actions/deploy-pages@v4
