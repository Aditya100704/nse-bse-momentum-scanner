name: Daily Scan

on:
  schedule:
    # 11:00 UTC = 16:30 IST (30 min after NSE close)
    - cron: "0 11 * * 1-5"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run scanner
        # Bhavcopy-primary: fast (~3 min) and reliable. NSE mirror works from
        # any IP; BSE direct may be geo-blocked on US runners (degrades to NSE).
        env:
          SCAN_SKIP_YFINANCE: "1"
          SCAN_USE_BHAVCOPY: "1"
        run: python scan.py

      - name: Commit results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/
          if git diff --cached --quiet; then
            echo "No data changes"
            exit 0
          fi
          git commit -m "chore: refresh scan $(date -u +%Y-%m-%dT%H:%MZ)"
          # Main may have moved during the ~10 min scan; rebase-and-retry.
          for i in 1 2 3 4; do
            git pull --rebase origin main || true
            if git push; then
              echo "Pushed on attempt $i"
              exit 0
            fi
            echo "Push attempt $i rejected; retrying..."
            sleep $((i * 5))
          done
          echo "Push failed after 4 attempts"
          exit 1

  deploy:
    needs: scan
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
      - uses: actions/configure-pages@v5
      - name: Stage site
        run: |
          mkdir -p _site _site/data
          cp -r web/* _site/
          cp data/scanner_output.json _site/data/ 2>/dev/null || true
          cp data/news.json _site/data/ 2>/dev/null || true
          # Dashboard's relative path `../data/` -> `data/` on Pages
          sed -i 's|../data/scanner_output.json|data/scanner_output.json|g' _site/app.js
          sed -i 's|../data/news.json|data/news.json|g' _site/news.js
          # Cache-bust CSS + JS per deploy
          SHA="${GITHUB_SHA:0:7}"
          sed -i "s|href=\"style.css\"|href=\"style.css?v=${SHA}\"|g" _site/index.html
          sed -i "s|src=\"app.js\"|src=\"app.js?v=${SHA}\"|g" _site/index.html
          sed -i "s|src=\"trade.js\"|src=\"trade.js?v=${SHA}\"|g" _site/index.html
          sed -i "s|src=\"journal.js\"|src=\"journal.js?v=${SHA}\"|g" _site/index.html
          sed -i "s|src=\"news.js\"|src=\"news.js?v=${SHA}\"|g" _site/index.html
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site
      - id: deployment
        uses: actions/deploy-pages@v4
