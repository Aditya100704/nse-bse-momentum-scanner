name: Deploy site

# Fast deploys: skip the scan, only push the dashboard.
# - Auto-runs on every push that touches web/ or the scanner_output JSON
# - Also runnable manually for an emergency redeploy
on:
  push:
    branches: [main]
    paths:
      - 'web/**'
      - 'data/scanner_output.json'
      - 'data/news.json'
      - 'data/tickers.json'
      - 'data/fundamentals.json'
      - 'data/scanner_output_us.json'
      - 'data/news_us.json'
      - 'data/tickers_us.json'
      - 'data/fundamentals_us.json'
      - '.github/workflows/deploy.yml'
  workflow_dispatch: {}

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/configure-pages@v5

      - name: Stage site
        run: |
          mkdir -p _site _site/data
          cp -r web/* _site/
          for f in scanner_output news tickers fundamentals \
                   scanner_output_us news_us tickers_us fundamentals_us; do
            cp "data/$f.json" _site/data/ 2>/dev/null || true
          done
          # Dashboard's dev path '../data/' -> 'data/' on Pages (prefix rewrite covers
          # the market-aware template paths in app.js / news.js / trade.js)
          sed -i 's|\.\./data/|data/|g' _site/app.js _site/news.js _site/trade.js
          # Cache-bust: append commit SHA as query string to CSS + JS links
          # so every deploy forces clients to re-download the new files.
          SHA="${GITHUB_SHA:0:7}"
          sed -i "s|href=\"style.css\"|href=\"style.css?v=${SHA}\"|g" _site/index.html
          sed -i "s|src=\"app.js\"|src=\"app.js?v=${SHA}\"|g" _site/index.html
          sed -i "s|src=\"trade.js\"|src=\"trade.js?v=${SHA}\"|g" _site/index.html
          sed -i "s|src=\"journal.js\"|src=\"journal.js?v=${SHA}\"|g" _site/index.html
          sed -i "s|src=\"news.js\"|src=\"news.js?v=${SHA}\"|g" _site/index.html
          sed -i "s|src=\"hero.js\"|src=\"hero.js?v=${SHA}\"|g" _site/index.html

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - id: deployment
        uses: actions/deploy-pages@v4
