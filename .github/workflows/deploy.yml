name: Deploy site

# Fast deploys: skip the scan, only push the dashboard.
# - Auto-runs on every push that touches web/ or the scanner_output JSON
# - Also runnable manually for an emergency redeploy
on:
  push:
    branches: [main]
    paths:
      - 'web/**'
      - 'data/scanner_output.json'
      - 'data/news.json'
      - 'data/tickers.json'
      - 'data/fundamentals.json'
      - '.github/workflows/deploy.yml'
  workflow_dispatch: {}

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/configure-pages@v5

      - name: Stage site
        run: |
          mkdir -p _site _site/data
          cp -r web/* _site/
          cp data/scanner_output.json _site/data/ 2>/dev/null || true
          cp data/news.json _site/data/ 2>/dev/null || true
          cp data/tickers.json _site/data/ 2>/dev/null || true
          cp data/fundamentals.json _site/data/ 2>/dev/null || true
          # Dashboard's dev path '../data/' -> 'data/' on Pages
          sed -i 's|../data/scanner_output.json|data/scanner_output.json|g' _site/app.js
          sed -i 's|../data/fundamentals.json|data/fundamentals.json|g' _site/app.js
          sed -i 's|../data/news.json|data/news.json|g' _site/news.js
          sed -i 's|../data/tickers.json|data/tickers.json|g' _site/trade.js
          # Cache-bust: append commit SHA as query string to CSS + JS links
          # so every deploy forces clients to re-download the new files.
          SHA="${GITHUB_SHA:0:7}"
          sed -i "s|href=\"style.css\"|href=\"style.css?v=${SHA}\"|g" _site/index.html
          sed -i "s|src=\"app.js\"|src=\"app.js?v=${SHA}\"|g" _site/index.html
          sed -i "s|src=\"trade.js\"|src=\"trade.js?v=${SHA}\"|g" _site/index.html
          sed -i "s|src=\"journal.js\"|src=\"journal.js?v=${SHA}\"|g" _site/index.html
          sed -i "s|src=\"news.js\"|src=\"news.js?v=${SHA}\"|g" _site/index.html
          sed -i "s|src=\"hero.js\"|src=\"hero.js?v=${SHA}\"|g" _site/index.html

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - id: deployment
        uses: actions/deploy-pages@v4
