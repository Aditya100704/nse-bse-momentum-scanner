name: Fetch fundamentals

# Pulls EPS growth, sales growth, margins, P/E and the next earnings date for
# every qualifier + IPO + episodic pivot from TradingView's public scanner into
# data/fundamentals.json. No login / API key. The dashboard merges it in.
on:
  schedule:
    - cron: '45 11 * * 1-5'   # 17:15 IST weekdays, just after scan + news
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: fundamentals
  cancel-in-progress: false

jobs:
  fundamentals:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install requests
      - name: Fetch fundamentals (India)
        run: python fundamentals_fetch.py
      - name: Fetch fundamentals (US)
        env:
          SCAN_MARKET: "us"
        run: python fundamentals_fetch.py || echo "US fundamentals failed (non-fatal)"
      - name: Commit fundamentals.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/fundamentals.json data/fundamentals_us.json
          if git diff --cached --quiet; then
            echo "no fundamentals changes"; exit 0
          fi
          git commit -m "fundamentals: refresh [skip ci]"
          for i in 1 2 3; do
            git pull --rebase --autostash && git push && break || sleep 5
          done
